# ============================================================
# adaptive-tool-discovery/MANIFEST.toml
# ============================================================

schema = "adaptive-interfaces-manifest-1"
schema_url = "https://github.com/adaptive-interfaces/.github/blob/main/schemas/adaptive-interfaces-manifest-1.md"

[meta]
framework = "Adaptive Interfaces"
framework_url = "https://github.com/adaptive-interfaces"
framework_note = "Provides definitions and conventions for adaptive-interfaces manifest semantics."
description = "Declarative claim of repository intent, scope, and role."
purpose = "To make explicit the boundaries, responsibilities, and expectations of this repository relative to others."

[repo]
name = "adaptive-tool-discovery"
kind = "domain-skill"
description = "Maps the capability surface of external tools — MCP servers, APIs, CLIs, SDKs — into a persistent registry agents can load and act on."

[layer]
space = "Agent Engineering"
role = "domain-skill"

[depends]
required = [
  "adaptive-conformance-specification",
  "claude-code>=1.0",
]
optional = [
  "nodejs>=20",
  "npx",
  "uvx",
  "github-personal-access-token",
]

[provides]
artifacts = [
  "SKILL.md",
  "MANIFEST.toml",
  "DECISIONS.md",
  "CITATION.cff",
  "LICENSE",
  "README.md",
  "evaluation/rubric.md",
  "evaluation/scenarios/",
]

[scope]
includes = [
  "discovery of available tools on a given surface",
  "capability mapping: purpose, invocation, inputs, outputs, failures, constraints",
  "production of a structured persistent capability registry",
  "verification of tool behavior through execution",
  "refresh protocol for keeping the registry current",
  "evaluation scenarios and rubric for discovery quality",
]
excludes = [
  "codebase or team onboarding context (see adaptive-onboarding)",
  "observation and conformance discipline (governed by ACS)",
  "post-discovery verification of agent understanding",
  "normative judgments about tool design or quality",
]

[citation]
cff = "CITATION.cff"
preferred = "repo"

[traceability]
identifier_map = "none"
