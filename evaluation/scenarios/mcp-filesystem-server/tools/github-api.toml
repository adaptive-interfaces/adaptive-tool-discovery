schema_url = "https://docs.github.com/rest/pulls/pulls#get-a-pull-request"

[tools.outputs]
success = "HTTP 200 with full pull request object (id, node_id, number, state, title, body, user, head, base, merged, mergeable, rebaseable, labels, assignees, requested_reviewers, draft, created_at, updated_at, closed_at, merged_at, merge_commit_sha, html_url, diff_url, patch_url, issue_url, commits_url, review_comments_url, statuses_url, _links, author_association, auto_merge, ...)"
schema_url = "https://docs.github.com/rest/pulls/pulls#get-a-pull-request"

[tools.failures]
"404" = "Pull request not found or repository not found"

[tools.constraints]
rate_limit = "5000 requests/hour (authenticated)"
scope = "none for public repos; repo for private repos"

[tools.meta]
verified = "2026-03-31"
verified_by = "claude-sonnet-4-6 via ATD"
notes = "Verified HTTP 200 live: GET https://api.github.com/repos/octocat/Hello-World/pulls/7335 (closed PR). Response contains nested 'head' and 'base' repo objects with full repository metadata."

