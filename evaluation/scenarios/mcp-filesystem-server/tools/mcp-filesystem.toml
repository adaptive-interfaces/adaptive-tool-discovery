[[tools]]
name = "read_media_file"
purpose = "Read a binary media file and return it as base64-encoded content with MIME type."
invoke = "MCP tool call: {\"name\": \"read_media_file\", \"arguments\": {\"path\": \"<path>\"}}"
auth = "none"

[tools.inputs]
required = ["path"]
optional = []
schema_url = ""

[tools.outputs]
success = "{ content: [{ type: 'image'|'audio'|'blob', data: string (base64), mimeType: string }] }"
schema_url = ""

[tools.failures]
PATH_OUTSIDE_ALLOWED = "Error if path resolves outside all allowed directories"
FILE_NOT_FOUND = "Throws ENOENT if path does not exist"

[tools.constraints]
rate_limit = "none"
scope = "Paths must resolve within server-declared allowed directories; supported formats: png, jpg, gif, webp, bmp, svg, mp3, wav, ogg, flac; others returned as application/octet-stream"

