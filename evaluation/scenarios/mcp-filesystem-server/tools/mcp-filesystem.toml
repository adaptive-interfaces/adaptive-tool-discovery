purpose = "Apply one or more exact-text replacements to a file, with optional dry-run preview."
invoke = "MCP tool call: {\"name\": \"edit_file\", \"arguments\": {\"path\": \"<path>\", \"edits\": [{\"oldText\": \"<match>\", \"newText\": \"<replacement>\"}]}}"
auth = "none"

[tools.inputs]
required = ["path", "edits"]
optional = ["dryRun"]
schema_url = ""

[tools.outputs]
success = "{ content: string } — git-style diff of changes applied (or previewed if dryRun=true)"
schema_url = ""

[tools.failures]
PATH_OUTSIDE_ALLOWED = "Error if path resolves outside all allowed directories"
NO_MATCH = "Error if oldText does not match exactly"

[tools.constraints]
rate_limit = "none"
scope = "Paths must resolve within server-declared allowed directories; oldText must match exactly (no fuzzy matching)"

[tools.meta]
verified = "unverified"
verified_by = "claude-sonnet-4-6 via ATD run 2026-03-31"
notes = "Destructive and NOT idempotent (per MCP annotations). dryRun defaults to false."

