[[tools]]
name = "read_multiple_files"
purpose = "Read several files in a single call; failed reads are reported inline without aborting the batch."
invoke = "MCP tool call: {\"name\": \"read_multiple_files\", \"arguments\": {\"paths\": [\"<path1>\", \"<path2>\"]}}"
auth = "none"

[tools.inputs]
required = ["paths"]
optional = []
schema_url = ""

[tools.outputs]
success = "{ content: string } — all files concatenated, separated by \\n---\\n; individual read errors embedded inline"
schema_url = ""

[tools.failures]
PATH_OUTSIDE_ALLOWED = "Error for any path outside allowed directories"
MIN_LENGTH = "paths array must have at least 1 element"

[tools.constraints]
rate_limit = "none"
scope = "All paths must resolve within server-declared allowed directories"

[tools.meta]
verified = "unverified"
verified_by = "claude-sonnet-4-6 via ATD run 2026-03-31"
notes = "Partial failures do not abort the batch; errors appear inline in the returned content."

[[tools]]
name = "write_file"
purpose = "Create or fully overwrite a file with the given content."
invoke = "MCP tool call: {\"name\": \"write_file\", \"arguments\": {\"path\": \"<path>\", \"content\": \"<content>\"}}"
auth = "none"

[tools.inputs]
required = ["path", "content"]
optional = []
schema_url = ""

[tools.outputs]
success = "{ content: string } — success message: 'Successfully wrote to <path>'"
schema_url = ""

[tools.failures]
PATH_OUTSIDE_ALLOWED = "Error if path resolves outside all allowed directories"
PERMISSION_DENIED = "Throws EACCES if filesystem permissions deny the write"

[tools.constraints]
rate_limit = "none"
scope = "Paths must resolve within server-declared allowed directories; overwrites without confirmation"

[tools.meta]
verified = "unverified"
verified_by = "claude-sonnet-4-6 via ATD run 2026-03-31"
notes = "Destructive and idempotent (per MCP annotations). No confirmation before overwrite."

[[tools]]
