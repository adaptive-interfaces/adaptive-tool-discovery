# MCP Reference Filesystem Server — Capability Registry
# Source: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
# Server name: secure-filesystem-server v0.2.0
# Transport: stdio
# Discovery source: server source (index.ts) read from GitHub; no live MCP connection was established in this session.

[[tools]]
name = "read_file"
purpose = "Read the full text contents of a file (deprecated alias for read_text_file)."
invoke = "MCP tool call: {\"name\": \"read_file\", \"arguments\": {\"path\": \"<path>\"}}"
auth = "none"

[tools.inputs]
required = ["path"]
optional = ["head", "tail"]
schema_url = ""

[tools.outputs]
success = "{ content: string } — full file text, or first/last N lines if head/tail supplied"
schema_url = ""

[tools.failures]
BOTH_HEAD_TAIL = "Error thrown if both head and tail are specified simultaneously"
PATH_OUTSIDE_ALLOWED = "Error if path resolves outside all allowed directories"
FILE_NOT_FOUND = "Throws ENOENT if path does not exist"

[tools.constraints]
rate_limit = "none"
scope = "Paths must resolve within server-declared allowed directories"

[tools.meta]
verified = "unverified"
verified_by = "claude-sonnet-4-6 via ATD run 2026-03-31"
notes = "Deprecated; prefer read_text_file. head and tail are mutually exclusive."

